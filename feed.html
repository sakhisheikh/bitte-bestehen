<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0a0a0a" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />

<title>Bitte Bestehen — Feed</title>
<meta name="robots" content="noindex, nofollow" />
<meta name="googlebot" content="noindex, nofollow" />
<meta name="referrer" content="no-referrer" />

<script src="app-shared.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --card: #161616;
    --card2: #1f1f1f;
    --line: #222;
    --text: #f5f5f5;
    --muted: #888;
    --green: #22c55e;
    --green-bg: rgba(34, 197, 94, 0.15);
    --green-border: rgba(34, 197, 94, 0.55);
    --red: #ef4444;
    --red-bg: rgba(239, 68, 68, 0.15);
    --orange: #f59e0b;
    --accent: #60a5fa;
    --safe-top: env(safe-area-inset-top, 0);
    --safe-bottom: env(safe-area-inset-bottom, 0);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    font-size: 16px; line-height: 1.4; }
  body { padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }

  /* Top bar */
  .topbar {
    position: sticky; top: 0; z-index: 30;
    background: rgba(10,10,10,0.92); backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    padding: 8px 12px 6px;
  }
  .progress-track {
    height: 3px; width: 100%;
    background: #222; border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent); width: 0%;
    transition: width 100ms ease;
  }
  .row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 6px; gap: 8px;
  }
  .row .left { display: flex; gap: 10px; align-items: center; font-size: 12px; color: var(--muted); }
  .row .left a { color: var(--accent); font-weight: 700; text-decoration: none; }
  .row .right { display: flex; gap: 6px; }
  .toolbtn {
    background: var(--card); color: var(--text); border: none;
    padding: 6px 10px; border-radius: 8px;
    font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .toolbtn.active { background: var(--accent); color: #0a0a0a; }

  /* Layout */
  main { max-width: 640px; margin: 0 auto; padding: 8px 12px 80px; }

  /* Sticky section headers */
  .theme-h {
    position: sticky;
    top: 56px; /* below topbar */
    z-index: 5;
    background: #111;
    margin: 12px -12px 6px;
    padding: 8px 12px;
    font-size: 11px; font-weight: 800; letter-spacing: 0.6px;
    color: var(--accent); text-transform: uppercase;
    border-bottom: 1px solid var(--line);
  }
  .chapter-h {
    padding: 4px 0 6px;
    font-size: 11px; color: var(--muted); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.3px;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px;
    margin: 0 0 12px;
    scroll-margin-top: 80px;
  }
  .qmeta {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; font-size: 11px; color: var(--muted);
  }
  .qmeta .id { font-family: ui-monospace, "SF Mono", monospace; font-size: 11px; }
  .points {
    padding: 2px 7px; border-radius: 5px;
    background: #2a2a2a; color: #ddd;
    font-weight: 700; font-size: 10px; letter-spacing: 0.3px;
  }
  .points.p5 { background: var(--red-bg); color: var(--red); }
  .points.p4 { background: rgba(245,158,11,0.18); color: var(--orange); }
  .qtext {
    font-size: 17px; font-weight: 600; line-height: 1.3;
    margin: 2px 0 10px;
  }
  .media {
    margin: 0 0 10px;
    border-radius: 10px; overflow: hidden;
    background: #000;
  }
  .media img, .media video {
    width: 100%; height: auto; display: block;
    max-height: 50vh; object-fit: contain; background: #000;
  }
  .options { display: flex; flex-direction: column; gap: 6px; }
  .option {
    display: flex; gap: 8px;
    padding: 9px 11px;
    background: var(--card2);
    border: 1.5px solid transparent;
    border-radius: 10px;
    font-size: 14.5px; line-height: 1.35;
    -webkit-user-select: text; user-select: text;
  }
  .option .letter {
    font-weight: 700; color: var(--muted);
    flex-shrink: 0; min-width: 20px;
  }
  .option.correct { background: var(--green-bg); border-color: var(--green-border); }
  .option.correct .letter { color: var(--green); }
  .option.correct::after {
    content: "✓"; margin-left: auto;
    color: var(--green); font-weight: 800; font-size: 15px;
    align-self: center;
  }

  .comment-toggle {
    margin-top: 8px; padding: 6px 0;
    font-size: 12px; color: var(--accent);
    cursor: pointer; user-select: none;
  }
  .comment {
    margin-top: 6px;
    padding: 10px 12px;
    background: var(--card2);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    font-size: 13.5px; color: #ccc; line-height: 1.5;
    display: none;
  }
  .comment.open { display: block; }

  .empty { padding: 60px 20px; text-align: center; color: var(--muted); }

  /* Floating "scroll to top" */
  .fab {
    position: fixed; right: 14px; bottom: calc(14px + var(--safe-bottom));
    background: var(--card); color: var(--text);
    width: 44px; height: 44px; border-radius: 22px;
    display: none; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; border: 1px solid var(--line);
    box-shadow: 0 6px 18px rgba(0,0,0,0.4);
    cursor: pointer; z-index: 40;
  }
  .fab.show { display: flex; }
  .fab:active { transform: scale(0.95); }

  /* Modal sheet */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
    display: none; align-items: flex-end; justify-content: center; }
  .modal.open { display: flex; }
  .sheet { width: 100%; max-width: 480px; background: var(--card);
    border-radius: 16px 16px 0 0; padding: 16px 16px calc(16px + var(--safe-bottom));
    max-height: 80vh; overflow-y: auto; }
  .sheet h3 { margin: 0 0 10px; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }
  .sheet button { display: block; width: 100%; text-align: left;
    padding: 11px 13px; background: var(--card2); border: none; border-radius: 10px;
    color: var(--text); font-size: 15px; margin-bottom: 6px; cursor: pointer; }
  .sheet button.active { background: var(--accent); color: #0a0a0a; font-weight: 700; }
  .sheet button.danger { color: var(--red); }

  .star-btn { background: transparent; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 0 2px; line-height: 1; }
  .star-btn.on { color: #fbbf24; }
  .source-link {
    color: var(--accent); text-decoration: none; font-size: 13px;
    padding: 5px 9px; border-radius: 6px;
    background: rgba(96, 165, 250, 0.10);
    flex-shrink: 0; line-height: 1;
    -webkit-tap-highlight-color: rgba(96,165,250,0.25);
  }
  .fragment-hint {
    margin: 6px 0 10px;
    padding: 7px 10px;
    background: rgba(245,158,11,0.10);
    border-left: 3px solid var(--orange);
    border-radius: 6px;
    font-size: 12px; color: #d4d4d4; line-height: 1.4;
  }
  .free-answer {
    padding: 14px;
    background: var(--green-bg);
    border: 2px solid var(--green-border);
    border-radius: 10px;
    color: var(--green);
    font-size: 19px; font-weight: 700;
    text-align: center;
  }
  /* Test/practice mode states */
  .option.selected {
    background: rgba(96,165,250,0.15);
    border-color: var(--accent);
    cursor: pointer;
  }
  .option.selected .letter { color: var(--accent); }
  .option.wrong-pick {
    background: rgba(239,68,68,0.15);
    border-color: rgba(239,68,68,0.55);
  }
  .option.wrong-pick .letter { color: var(--red); }
  .option.wrong-pick::after {
    content: "✗"; margin-left: auto;
    color: var(--red); font-weight: 800; font-size: 16px;
    align-self: center;
  }
  .option.tappable { cursor: pointer; }
  .submit-btn {
    margin-top: 8px; width: 100%;
    padding: 12px; background: var(--accent); color: #0a0a0a;
    border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .submit-btn:active { opacity: 0.85; }
  .result-banner {
    margin-top: 8px; padding: 8px 12px;
    border-radius: 8px; font-size: 13px; font-weight: 700;
    text-align: center;
  }
  .result-banner.correct { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .result-banner.wrong { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.55); }

  /* Inline search bar — slides under the topbar to filter the feed */
  .searchbar {
    display: none;
    padding: 8px 14px;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    gap: 8px; align-items: center;
    position: sticky;
    top: 56px; /* below the main topbar */
    z-index: 25;
  }
  .searchbar.open { display: flex; }
  .searchbar input {
    flex: 1; padding: 8px 12px; border-radius: 8px;
    background: var(--card2); color: var(--text);
    border: 1px solid var(--card2); font-size: 15px;
    -webkit-appearance: none; appearance: none;
  }
  .searchbar input::placeholder { color: var(--muted); }
  .searchbar .clear-btn {
    background: var(--card); color: var(--text);
    border: none; padding: 8px 12px; border-radius: 8px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    line-height: 1;
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="row">
      <div class="left">
        <a href="exam.html">Exam</a>
        <a href="rules.html">Rules</a>
        <a href="signs.html">Signs</a>
        <a href="cheatsheet.html">Sheet</a>
        <a href="quiz.html" title="Single-card mode">Card</a>
        <span id="counter">…</span>
        <span id="filterLabel"></span>
      </div>
      <div class="right">
        <button class="toolbtn" id="langBtn" title="Toggle language">EN</button>
        <button class="toolbtn" id="searchBtn" title="Search">⌕</button>
        <button class="toolbtn" id="shuffleBtn">Shuffle</button>
        <button class="toolbtn" id="filterBtn">Filter</button>
      </div>
    </div>
    <div class="searchbar" id="searchbar">
      <input id="searchInput" type="search" placeholder="Search…" autocomplete="off" />
      <button class="clear-btn" id="searchClear" title="Clear">×</button>
    </div>
  </header>

  <main id="main"><div class="empty">Loading…</div></main>

  <button class="fab" id="topFab" title="Scroll to top">↑</button>

  <div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const STATE_KEY = 'dt_state_v1';
  const ORDER_KEY = 'dt_order_v1';
  const FEED_POS_KEY = 'dt_feed_pos_v1';

  let order = [];
  let pointsAllowed = new Set(); // empty = all allowed; otherwise only these point values
  let favOnly = false;
  let searchQuery = '';
  let mistakesOnly = false;
  let mode = 'memorize'; // 'memorize' | 'test'
  let klasseKey = 'all';
  let lang = 'en';
  let mediaIO = null;
  let positionIO = null;
  let openComments = new Set();
  let firstVisibleIdx = 0;
  let scrollRestored = false;
  const T = (en, de) => lang === 'de' ? de : en;

  // Per-question test state shared with SPA (dt_progress_v1)
  const PROGRESS_KEY = 'dt_progress_v1';
  let progress = {};       // qid -> { result, selected }
  let pending = {};        // qid -> Set<letter> while unsubmitted
  function loadProgress() {
    try { progress = JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}') || {}; } catch { progress = {}; }
  }
  function saveProgress() {
    try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress)); } catch {}
  }
  // One-time cleanup: an earlier feed Test-mode bug double-fired the submit
  // handler, overwriting correct submissions to {result:'wrong', selected:[]}.
  // Detect those, drop them from progress, and remove the qid from the
  // mistakes log (they were never really wrong).
  function repairBuggyProgress() {
    const FLAG = 'dt_repaired_v2';
    if (localStorage.getItem(FLAG)) return;
    let n = 0;
    for (const [qid, rec] of Object.entries(progress)) {
      if (rec && rec.result === 'wrong' && (!rec.selected || rec.selected.length === 0)) {
        delete progress[qid];
        DT.recordOutcome(qid, true); // removes qid from mistakes set
        n++;
      }
    }
    if (n > 0) saveProgress();
    localStorage.setItem(FLAG, String(Date.now()));
  }

  function saveState() {
    const cur = JSON.parse(localStorage.getItem(STATE_KEY) || '{}');
    cur.pointsAllowed = [...pointsAllowed];
    delete cur.p5Only;
    cur.favOnly = favOnly; cur.mistakesOnly = mistakesOnly;
    cur.mode = mode; cur.klasseKey = klasseKey; cur.lang = lang;
    cur.searchQuery = searchQuery;
    localStorage.setItem(STATE_KEY, JSON.stringify(cur));
    localStorage.setItem(ORDER_KEY, JSON.stringify(order));
  }
  function loadState() {
    try {
      const s = JSON.parse(localStorage.getItem(STATE_KEY) || '{}');
      const o = JSON.parse(localStorage.getItem(ORDER_KEY) || 'null');
      if (Array.isArray(s.pointsAllowed)) pointsAllowed = new Set(s.pointsAllowed.map(Number));
      else if (s.p5Only === true) pointsAllowed = new Set([5]); // legacy migration
      if (typeof s.favOnly === 'boolean') favOnly = s.favOnly;
      if (typeof s.mistakesOnly === 'boolean') mistakesOnly = s.mistakesOnly;
      if (s.mode === 'memorize' || s.mode === 'test') mode = s.mode;
      if (typeof s.klasseKey === 'string') klasseKey = s.klasseKey;
      if (typeof s.lang === 'string') lang = s.lang;
      if (typeof s.searchQuery === 'string') searchQuery = s.searchQuery;
      if (Array.isArray(o)) order = o;
    } catch (e) {}
    const urlLang = new URLSearchParams(location.search).get('lang');
    if (urlLang === 'de' || urlLang === 'en') lang = urlLang;
  }

  // Substring match across qid, question text (EN+DE), correct answers, options.
  function matchesQuery(idx, q) {
    if (!q) return true;
    const e = DT.structural(idx);
    const d = DT.getQ(idx, 'de');
    const haystacks = [
      e.question_id, e.question_text || '', d && d.question_text || '',
      ...(e.correct_answers || []).map(c => c.text || c.letter || ''),
      ...(d && d.correct_answers || []).map(c => c.text || c.letter || ''),
      ...(e.options || []).map(o => o.text || ''),
      ...(d && d.options || []).map(o => o.text || '')
    ];
    return haystacks.some(s => s && s.toLowerCase().includes(q));
  }

  function rebuildOrder() {
    let pool = DT.poolIndices(klasseKey);
    if (pointsAllowed.size) {
      pool = pool.filter(i => pointsAllowed.has(DT.pointsNum(DT.structural(i))));
    }
    if (favOnly) {
      const favs = new Set(DT.favoriteIds());
      pool = pool.filter(i => favs.has(DT.structural(i).question_id));
    }
    if (mistakesOnly) {
      const ms = new Set(DT.mistakeIds());
      pool = pool.filter(i => ms.has(DT.structural(i).question_id));
    }
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      pool = pool.filter(i => matchesQuery(i, q));
    }
    order = pool;
    saveState();
  }

  function toggleSearch() {
    const bar = $('searchbar');
    const input = $('searchInput');
    if (!bar.classList.contains('open')) {
      bar.classList.add('open');
      input.value = searchQuery;
      input.placeholder = T('Search question, answer, ID…', 'Frage, Antwort, ID suchen…');
      setTimeout(() => input.focus(), 50);
    } else {
      bar.classList.remove('open');
      input.blur();
    }
  }
  function clearSearch() {
    $('searchInput').value = '';
    if (searchQuery) {
      searchQuery = '';
      rebuildOrder();
      localStorage.removeItem(FEED_POS_KEY);
      render();
    }
    $('searchInput').focus();
  }
  let searchDebounce;
  function onSearchInput(e) {
    clearTimeout(searchDebounce);
    const v = e.target.value.trim();
    searchDebounce = setTimeout(() => {
      if (v === searchQuery) return;
      searchQuery = v;
      rebuildOrder();
      localStorage.removeItem(FEED_POS_KEY);
      render();
    }, 150);
  }
  function shuffleOrder() {
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }
    saveState();
    localStorage.removeItem(FEED_POS_KEY);
    render();
  }

  function render() {
    document.documentElement.lang = lang;
    $('langBtn').textContent = lang.toUpperCase();
    $('shuffleBtn').textContent = T('Shuffle', 'Mischen');
    $('filterBtn').textContent = T('Filter', 'Filter');

    if (!order.length) {
      $('main').innerHTML = `<div class="empty">${T('No questions match this filter.', 'Keine Fragen für diesen Filter.')}</div>`;
      $('counter').textContent = '0 / 0';
      $('progressFill').style.width = '0%';
      return;
    }
    const labels = [];
    if (mode === 'test') labels.push('TEST');
    if (klasseKey !== 'all') labels.push(DT.klasseLabel(klasseKey, lang));
    if (pointsAllowed.size) {
      const sorted = [...pointsAllowed].sort();
      labels.push(`${sorted.join('+')}pt`);
    }
    if (favOnly) labels.push('★');
    if (mistakesOnly) labels.push('✗');
    if (searchQuery) labels.push(`"${searchQuery}"`);
    if (mode === 'test') {
      let right = 0, wrong = 0;
      for (const i of order) {
        const qid = DT.structural(i).question_id;
        const p = progress[qid];
        if (p) { if (p.result === 'correct') right++; else wrong++; }
      }
      labels.push(`${right}✓·${wrong}✗`);
    }
    $('filterLabel').textContent = labels.length ? '· ' + labels.join(' · ') : '';

    const naturalOrder = isNaturalOrder();

    const html = [];
    let lastTheme = null, lastChapter = null;
    for (let i = 0; i < order.length; i++) {
      const q = DT.getQ(order[i], lang);
      if (naturalOrder) {
        if (q.theme_name !== lastTheme) {
          html.push(`<div class="theme-h">${esc(q.theme_name)}</div>`);
          lastTheme = q.theme_name;
          lastChapter = null;
        }
        if (q.chapter_name !== lastChapter) {
          html.push(`<div class="chapter-h">${esc(q.chapter_name)}</div>`);
          lastChapter = q.chapter_name;
        }
      }
      html.push(card(q, i));
    }
    $('main').innerHTML = html.join('');

    setupLazyMedia();
    setupCommentToggles();
    setupStarButtons();
    setupTestMode();
    setupPositionTracker();
    restoreScrollPosition();
    updateCounter();
  }

  function setupTestMode() {
    if (mode !== 'test') return;

    // Tap an option in an unsubmitted card to toggle selection. Always toggle
    // (regardless of how many correct answers exist) so the user can
    // deliberately over-select and learn from a wrong submission.
    document.querySelectorAll('.option.tappable[data-letter][data-qid]').forEach(el => {
      el.onclick = () => {
        const qid = el.dataset.qid;
        const letter = el.dataset.letter;
        if (!pending[qid]) pending[qid] = new Set();
        const set = pending[qid];
        if (set.has(letter)) set.delete(letter); else set.add(letter);
        rerenderCardOptions(qid);
      };
    });

    // Submit per card. Use .onclick (not addEventListener) so repeated wirings
    // overwrite instead of accumulate — option re-renders kept stacking handlers,
    // and a stale handler with empty `pending` overwrote correct submissions.
    document.querySelectorAll('.submit-btn[data-submit-qid]').forEach(btn => {
      btn.onclick = () => submitFromBtn(btn);
    });
  }

  function submitFromBtn(btn) {
    const qid = btn.dataset.submitQid;
    const idx = lookupIdxByQid(qid);
    if (idx == null) return;
    const sQ = DT.structural(idx);
    const correct = new Set((sQ.correct_answers || []).map(c => c.letter));
    const sel = pending[qid] || new Set();
    if (sel.size === 0) return; // safety: ignore empty submits
    const right = sel.size === correct.size && [...sel].every(l => correct.has(l));
    progress[qid] = { result: right ? 'correct' : 'wrong', selected: [...sel] };
    saveProgress();
    DT.recordOutcome(qid, right);
    delete pending[qid];
    rerenderCard(qid);
  }

  // Map a qid back to its index in DT (used by feed since cards live as 'order' entries)
  let _qidIdxCache = null;
  function lookupIdxByQid(qid) {
    if (!_qidIdxCache) {
      _qidIdxCache = new Map();
      for (let i = 0; i < DT.totalCount(); i++) {
        _qidIdxCache.set(DT.structural(i).question_id, i);
      }
    }
    return _qidIdxCache.get(qid);
  }

  function rerenderCardOptions(qid) {
    // Light update of the card's option pills + submit button
    const cardEl = document.querySelector(`.card[data-qid="${cssEsc(qid)}"]`);
    if (!cardEl) return;
    const sQ = DT.structural(lookupIdxByQid(qid));
    const localized = DT.getQ(lookupIdxByQid(qid), lang);
    const correct = new Set((sQ.correct_answers || []).map(c => c.letter));
    const userSet = pending[qid] || new Set();
    const optsEl = cardEl.querySelector('.options');
    if (!optsEl) return;
    const html = (localized.options || []).map(o => {
      const isSel = userSet.has(o.letter);
      const cls = isSel ? 'selected tappable' : 'tappable';
      return `<div class="option ${cls}" data-letter="${escAttr(o.letter)}" data-qid="${escAttr(qid)}">
        <span class="letter">${esc(o.letter)}</span>
        <span class="text">${esc(o.text)}</span>
      </div>`;
    }).join('');
    optsEl.innerHTML = html;
    const btn = cardEl.querySelector('.submit-btn');
    if (btn) btn.disabled = userSet.size === 0;
    // Re-attach click handlers to the new option elements
    setupTestModeForCard(cardEl);
  }

  function rerenderCard(qid) {
    // Full re-render of one card after submit (to show banner + reveal styling)
    const cardEl = document.querySelector(`.card[data-qid="${cssEsc(qid)}"]`);
    if (!cardEl) return;
    const idx = lookupIdxByQid(qid);
    if (idx == null) return;
    const localized = DT.getQ(idx, lang);
    // Find the position in order to keep the same data-idx
    const orderPos = order.indexOf(idx);
    const newHtml = card(localized, orderPos >= 0 ? orderPos : 0);
    const tmp = document.createElement('div');
    tmp.innerHTML = newHtml.trim();
    cardEl.replaceWith(tmp.firstChild);
    // Re-wire just this card's media + comments + star + test
    setupLazyMedia();
    setupCommentToggles();
    setupStarButtons();
    setupTestMode();
    updateCounter();
  }

  function setupTestModeForCard(cardEl) {
    if (mode !== 'test') return;
    cardEl.querySelectorAll('.option.tappable[data-letter][data-qid]').forEach(el => {
      // Always toggle — over-selecting is allowed on single-correct questions.
      el.onclick = () => {
        const qid = el.dataset.qid;
        const letter = el.dataset.letter;
        if (!pending[qid]) pending[qid] = new Set();
        const set = pending[qid];
        if (set.has(letter)) set.delete(letter); else set.add(letter);
        rerenderCardOptions(qid);
      };
    });
    const btn = cardEl.querySelector('.submit-btn[data-submit-qid]');
    if (btn) btn.onclick = () => submitFromBtn(btn);
  }

  function setupStarButtons() {
    document.querySelectorAll('.star-btn[data-fav-qid]').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const qid = btn.dataset.favQid;
        const nowFav = DT.toggleFavorite(qid);
        btn.textContent = nowFav ? '★' : '☆';
        btn.classList.toggle('on', nowFav);
      };
    });
  }

  // Delegate source-link clicks: window.open is needed for iOS PWA standalone
  // where bare <a target="_blank"> sometimes silently does nothing.
  document.addEventListener('click', (e) => {
    const a = e.target.closest('a.source-link[data-source]');
    if (!a) return;
    e.preventDefault();
    const u = a.getAttribute('href');
    const w = window.open(u, '_blank', 'noopener,noreferrer');
    if (!w) location.href = u;
  });

  function isNaturalOrder() {
    // Natural means first 30 IDs are monotonically increasing
    for (let i = 1; i < Math.min(order.length, 30); i++) {
      const a = DT.structural(order[i-1]).question_id;
      const b = DT.structural(order[i]).question_id;
      if (a > b) return false;
    }
    return true;
  }

  function card(q, idx) {
    const correctSet = new Set((q.correct_answers || []).map(c => c.letter));
    const ptsMatch = (q.points || '').match(/\d/);
    const ptsN = ptsMatch ? ptsMatch[0] : '';
    const ptsCls = ptsN === '5' ? 'p5' : (ptsN === '4' ? 'p4' : '');

    let media = '';
    if (q.image_urls && q.image_urls.length) {
      media = `<div class="media"><img src="${escAttr(q.image_urls[0])}" loading="lazy" decoding="async" alt=""/></div>`;
    } else if (q.video_urls && q.video_urls.length) {
      media = `<div class="media"><video data-src="${escAttr(q.video_urls[0])}" controls playsinline preload="none"></video></div>`;
    }

    const hasOptions = q.options && q.options.length > 0;
    const submittedRecord = mode === 'test' ? progress[q.question_id] : null;
    let answerBlock;
    if (!hasOptions && q.correct_answers && q.correct_answers.length) {
      const ans = q.correct_answers.map(c => esc(c.text || c.letter)).join(' / ');
      answerBlock = `<div class="free-answer">${T('Answer', 'Antwort')}: ${ans}</div>`;
    } else if (mode === 'test') {
      // Test mode: tap to select, Submit to reveal. Reuses dt_progress_v1.
      const userSet = submittedRecord
        ? new Set(submittedRecord.selected || [])
        : (pending[q.question_id] || new Set());
      const opts = (q.options || []).map(o => {
        const isCorrect = correctSet.has(o.letter);
        const isSel = userSet.has(o.letter);
        let cls = '';
        if (submittedRecord) {
          if (isCorrect) cls = 'correct';
          else if (isSel) cls = 'wrong-pick';
        } else {
          cls = isSel ? 'selected tappable' : 'tappable';
        }
        return `<div class="option ${cls}" data-letter="${escAttr(o.letter)}" data-qid="${escAttr(q.question_id)}">
          <span class="letter">${esc(o.letter)}</span>
          <span class="text">${esc(o.text)}</span>
        </div>`;
      }).join('');
      let footer = '';
      if (submittedRecord) {
        const r = submittedRecord.result;
        footer = `<div class="result-banner ${r}">${r === 'correct' ? T('✓ Correct','✓ Richtig') : T('✗ Wrong','✗ Falsch')}</div>`;
      } else {
        const enabled = userSet.size > 0;
        footer = `<button class="submit-btn" data-submit-qid="${escAttr(q.question_id)}"${enabled ? '' : ' disabled'}>${T('Submit','Bestätigen')}</button>`;
      }
      answerBlock = `<div class="options">${opts}</div>${footer}`;
    } else {
      const opts = (q.options || []).map(o => {
        const correct = correctSet.has(o.letter);
        return `<div class="option ${correct ? 'correct' : ''}">
          <span class="letter">${esc(o.letter)}</span>
          <span class="text">${esc(o.text)}</span>
        </div>`;
      }).join('');
      answerBlock = `<div class="options">${opts}</div>`;
    }

    const looksFragmented = hasOptions && q.options.every(o => {
      const t = (o.text || '').trim();
      return t.startsWith('-') ||
             /^(if|to|so as|because|in order|when|by)\b/i.test(t) ||
             /^(wenn|um|da|weil|durch|indem|beim|bevor|sobald)\b/i.test(t);
    });
    const fragmentHint = looksFragmented ? `<div class="fragment-hint">${T('Sentence-fragment options — see source ↗', 'Satzteil-Optionen — siehe Quelle ↗')}</div>` : '';

    const commentBlock = q.comment ? `
      <div class="comment-toggle" data-id="${escAttr(q.question_id)}">${T('Show explanation', 'Erklärung anzeigen')}</div>
      <div class="comment" data-id="${escAttr(q.question_id)}">${esc(q.comment)}</div>
    ` : '';

    const fav = DT.isFavorite(q.question_id);
    const sourceLink = q.url ? `<a class="source-link" data-source="1" href="${escAttr(q.url)}" target="_blank" rel="noopener">↗</a>` : '';

    return `<article class="card" data-idx="${idx}" data-qid="${escAttr(q.question_id)}">
      <div class="qmeta" style="display:flex; gap:6px; align-items:center;">
        <button class="star-btn ${fav ? 'on' : ''}" data-fav-qid="${escAttr(q.question_id)}">${fav ? '★' : '☆'}</button>
        <span class="id" style="flex:1; min-width:0; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;">${esc(q.question_id)} · ${esc(q.theme_name)}</span>
        ${sourceLink}
        <span class="points ${ptsCls}">${esc(q.points)}</span>
      </div>
      <div class="qtext">${esc(q.question_text)}</div>
      ${media}
      ${fragmentHint}
      ${answerBlock}
      ${commentBlock}
    </article>`;
  }

  function setupLazyMedia() {
    if (mediaIO) mediaIO.disconnect();
    mediaIO = new IntersectionObserver(entries => {
      for (const ent of entries) {
        if (!ent.isIntersecting) continue;
        const el = ent.target;
        const src = el.dataset.src;
        if (!src) continue;
        if (el.tagName === 'IMG') el.src = src;
        else if (el.tagName === 'VIDEO') {
          el.src = src;
          el.preload = 'metadata';
          // Seek to last frame for the memorization-anchor thumbnail.
          el.addEventListener('loadedmetadata', () => {
            try {
              const d = el.duration;
              el.currentTime = (d && isFinite(d) && d > 0.4) ? Math.max(0.1, d - 0.1) : 0.1;
            } catch(_) {}
          }, { once: true });
          // First time the user actually plays, restart from the beginning
          // so they see the scenario unfold, not just the last second.
          el.addEventListener('play', function onFirstPlay() {
            el.removeEventListener('play', onFirstPlay);
            if (el.duration && Math.abs(el.duration - el.currentTime) < 1) {
              el.currentTime = 0;
            }
          });
        }
        delete el.dataset.src;
        mediaIO.unobserve(el);
      }
    }, { rootMargin: '600px 0px' });
    document.querySelectorAll('[data-src]').forEach(el => mediaIO.observe(el));
  }

  function setupCommentToggles() {
    document.querySelectorAll('.comment-toggle').forEach(btn => {
      const qid = btn.dataset.id;
      const body = document.querySelector(`.comment[data-id="${cssEsc(qid)}"]`);
      if (openComments.has(qid)) {
        body.classList.add('open');
        btn.textContent = T('Hide explanation', 'Erklärung ausblenden');
      }
      btn.onclick = () => {
        const isOpen = body.classList.toggle('open');
        btn.textContent = isOpen ? T('Hide explanation', 'Erklärung ausblenden') : T('Show explanation', 'Erklärung anzeigen');
        if (isOpen) openComments.add(qid); else openComments.delete(qid);
      };
    });
  }

  function setupPositionTracker() {
    if (positionIO) positionIO.disconnect();
    const visible = new Set();
    positionIO = new IntersectionObserver(entries => {
      for (const ent of entries) {
        const idx = +ent.target.dataset.idx;
        if (ent.isIntersecting) visible.add(idx);
        else visible.delete(idx);
      }
      if (visible.size) {
        firstVisibleIdx = Math.min(...visible);
        updateCounter();
        if (scrollRestored) {
          const qid = DT.structural(order[firstVisibleIdx])?.question_id;
          if (qid) localStorage.setItem(FEED_POS_KEY, qid);
        }
      }
    }, { threshold: 0.1 });
    document.querySelectorAll('.card').forEach(c => positionIO.observe(c));
  }

  function updateCounter() {
    $('counter').textContent = `${firstVisibleIdx + 1} / ${order.length}`;
    $('progressFill').style.width = `${((firstVisibleIdx + 1) / order.length) * 100}%`;
  }

  function restoreScrollPosition() {
    const qid = localStorage.getItem(FEED_POS_KEY);
    if (!qid) { scrollRestored = true; return; }
    const el = document.querySelector(`.card[data-qid="${cssEsc(qid)}"]`);
    if (el) {
      // wait one frame so layout is ready
      requestAnimationFrame(() => {
        el.scrollIntoView({ block: 'start' });
        // small offset for the sticky header
        window.scrollBy(0, -60);
        scrollRestored = true;
      });
    } else {
      scrollRestored = true;
    }
  }

  function openFilterSheet() {
    const klasseKeys = ['all','grundstoff','b','b_facts','lkw'];
    const favCount = DT.favoriteCount();
    const mistakesCount = DT.mistakeCount();
    const html = `
      <h3>${T('Mode', 'Modus')}</h3>
      <button class="${mode === 'memorize' ? 'active' : ''}" data-action="mode" data-v="memorize">${T('Memorize (pre-highlighted)', 'Auswendiglernen (vorgehoben)')}</button>
      <button class="${mode === 'test' ? 'active' : ''}" data-action="mode" data-v="test">${T('Test (tap & submit)', 'Selbsttest (tippen & bestätigen)')}</button>
      <h3 style="margin-top:14px;">${T('My mistakes', 'Meine Fehler')}</h3>
      <button class="${!mistakesOnly ? 'active' : ''}" data-action="mistakes" data-v="0">${T('All questions', 'Alle Fragen')}</button>
      <button class="${mistakesOnly ? 'active' : ''}" data-action="mistakes" data-v="1" ${mistakesCount === 0 ? 'disabled style="opacity:0.5;"' : ''}>✗ ${T('Mistakes only', 'Nur Fehler')} (${mistakesCount})</button>
      <h3 style="margin-top:14px;">${T('Favorites', 'Favoriten')}</h3>
      <button class="${!favOnly ? 'active' : ''}" data-action="fav" data-v="0">${T('All questions', 'Alle Fragen')}</button>
      <button class="${favOnly ? 'active' : ''}" data-action="fav" data-v="1" ${favCount === 0 ? 'disabled style="opacity:0.5;"' : ''}>★ ${T('Favorites only', 'Nur Favoriten')} (${favCount})</button>
      <h3 style="margin-top:14px;">${T('Klasse', 'Klasse')}</h3>
      ${klasseKeys.map(k => `<button class="${klasseKey === k ? 'active' : ''}" data-action="klasse" data-v="${k}">${esc(DT.klasseLabel(k, lang))} (${DT.klasseCount(k)})</button>`).join('')}
      <h3 style="margin-top:14px;">${T('Points', 'Punkte')}</h3>
      <div style="display:flex; gap:6px;">
        <button class="${!pointsAllowed.size ? 'active' : ''}" data-action="pts" data-v="all" style="flex:1; margin-bottom:0; text-align:center;">${T('All', 'Alle')}</button>
        ${[2,3,4,5].map(p => `<button class="${pointsAllowed.has(p) ? 'active' : ''}" data-action="pts" data-v="${p}" style="flex:1; margin-bottom:0; text-align:center;">${p}pt</button>`).join('')}
      </div>
      <h3 style="margin-top:14px;">${T('Language', 'Sprache')}</h3>
      <button class="${lang === 'en' ? 'active' : ''}" data-action="lang" data-v="en">English</button>
      <button class="${lang === 'de' ? 'active' : ''}" data-action="lang" data-v="de">Deutsch</button>
      <h3 style="margin-top:14px;">${T('Position', 'Position')}</h3>
      <button data-action="reset-pos">${T('Jump to top', 'Zum Anfang springen')}</button>
      <button data-action="close" style="margin-top:6px; text-align:center;">${T('Close', 'Schließen')}</button>
    `;
    $('sheet').innerHTML = html;
    $('modal').classList.add('open');
    $('sheet').querySelectorAll('button').forEach(b => {
      b.onclick = () => {
        const a = b.dataset.action, v = b.dataset.v;
        if (a === 'close') { $('modal').classList.remove('open'); return; }
        if (a === 'reset-pos') {
          localStorage.removeItem(FEED_POS_KEY);
          window.scrollTo({ top: 0 });
          $('modal').classList.remove('open');
          return;
        }
        if (a === 'pts') {
          if (v === 'all') pointsAllowed = new Set();
          else {
            const n = +v;
            if (pointsAllowed.has(n)) pointsAllowed.delete(n);
            else pointsAllowed.add(n);
          }
          rebuildOrder();
          localStorage.removeItem(FEED_POS_KEY);
          saveState();
          render();
          openFilterSheet(); // keep sheet open with updated active states
          return;
        }
        if (a === 'klasse') { klasseKey = v; rebuildOrder(); localStorage.removeItem(FEED_POS_KEY); }
        else if (a === 'fav') { favOnly = v === '1'; rebuildOrder(); localStorage.removeItem(FEED_POS_KEY); }
        else if (a === 'mistakes') { mistakesOnly = v === '1'; rebuildOrder(); localStorage.removeItem(FEED_POS_KEY); }
        else if (a === 'mode') { mode = v; pending = {}; }
        else if (a === 'lang') { lang = v; }
        saveState();
        render();
        $('modal').classList.remove('open');
      };
    });
  }

  function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function escAttr(s) { return esc(s); }
  function cssEsc(s) {
    if (window.CSS && CSS.escape) return CSS.escape(s);
    return String(s).replace(/[^a-zA-Z0-9_-]/g, c => '\\' + c);
  }

  async function init() {
    try {
      await DT.load();
    } catch (e) {
      $('main').innerHTML = '<div class="empty">Failed to load questions.</div>';
      return;
    }
    loadState();
    loadProgress();
    repairBuggyProgress();
    if (!order.length || order.length > DT.totalCount()) {
      rebuildOrder();
    }
    $('shuffleBtn').onclick = shuffleOrder;
    $('filterBtn').onclick = openFilterSheet;
    $('searchBtn').onclick = toggleSearch;
    $('searchInput').addEventListener('input', onSearchInput);
    $('searchClear').onclick = clearSearch;
    $('langBtn').onclick = () => { lang = lang === 'en' ? 'de' : 'en'; saveState(); render(); };
    $('topFab').onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
    $('modal').onclick = e => { if (e.target.id === 'modal') $('modal').classList.remove('open'); };

    // Restore search bar visibility if a query was persisted
    if (searchQuery) {
      $('searchbar').classList.add('open');
      $('searchInput').value = searchQuery;
    }

    // show top fab once user has scrolled
    window.addEventListener('scroll', () => {
      if (window.scrollY > 600) $('topFab').classList.add('show');
      else $('topFab').classList.remove('show');
    }, { passive: true });

    render();

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
  init();
})();
</script>
</body>
</html>
