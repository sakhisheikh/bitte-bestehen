<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Bitte Bestehen" />
<meta name="theme-color" content="#0a0a0a" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />

<title>Bitte Bestehen</title>
<meta name="robots" content="noindex, nofollow" />
<meta name="googlebot" content="noindex, nofollow" />
<meta name="referrer" content="no-referrer" />

<script src="app-shared.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --card: #161616;
    --card2: #1f1f1f;
    --text: #f5f5f5;
    --muted: #888;
    --green: #22c55e;
    --green-bg: rgba(34, 197, 94, 0.15);
    --green-border: rgba(34, 197, 94, 0.55);
    --red: #ef4444;
    --red-bg: rgba(239, 68, 68, 0.15);
    --accent: #60a5fa;
    --safe-top: env(safe-area-inset-top, 0);
    --safe-bottom: env(safe-area-inset-bottom, 0);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    font-size: 17px;
    line-height: 1.4;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }

  /* Top bar */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    padding: 8px 14px 6px;
  }
  .progress-track {
    height: 4px;
    width: 100%;
    background: #222;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 120ms ease;
  }
  .topmeta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
    font-size: 12px;
    color: var(--muted);
  }
  .topmeta .left { display: flex; gap: 10px; align-items: center; }
  .toolbtn {
    background: var(--card);
    color: var(--text);
    border: none;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .toolbtn.active { background: var(--accent); color: #0a0a0a; }

  /* Card */
  .stage {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 8px 14px 100px;
  }
  .qmeta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 12px;
    color: var(--muted);
  }
  .points {
    padding: 3px 8px;
    border-radius: 6px;
    background: #2a2a2a;
    color: #ddd;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.3px;
  }
  .points.p5 { background: var(--red-bg); color: var(--red); }
  .qtext {
    font-size: 21px;
    font-weight: 600;
    line-height: 1.3;
    margin: 4px 0 14px;
  }
  .media {
    margin-bottom: 14px;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
  }
  .media img, .media video {
    width: 100%;
    height: auto;
    display: block;
    max-height: 50vh;
    object-fit: contain;
    background: #000;
  }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option {
    display: flex;
    gap: 10px;
    padding: 12px 14px;
    background: var(--card);
    border: 2px solid transparent;
    border-radius: 12px;
    font-size: 16px;
    line-height: 1.35;
    -webkit-user-select: text;
    user-select: text;
  }
  .option .letter {
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
    min-width: 22px;
  }
  .option.correct {
    background: var(--green-bg);
    border-color: var(--green-border);
  }
  .option.correct .letter {
    color: var(--green);
  }
  .option.correct::after {
    content: "✓";
    margin-left: auto;
    color: var(--green);
    font-weight: 800;
    font-size: 18px;
    align-self: center;
  }

  .comment {
    margin-top: 16px;
    padding: 12px 14px;
    background: var(--card2);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    font-size: 14px;
    color: #ccc;
    line-height: 1.5;
  }
  .comment.collapsed {
    max-height: 64px;
    overflow: hidden;
    position: relative;
  }
  .comment.collapsed::after {
    content: "";
    position: absolute;
    inset: auto 0 0 0;
    height: 30px;
    background: linear-gradient(transparent, var(--card2));
  }
  .comment-toggle {
    margin-top: 6px;
    font-size: 12px;
    color: var(--accent);
    cursor: pointer;
    text-align: right;
  }

  /* Bottom controls */
  .bottombar {
    position: fixed;
    left: 0; right: 0;
    bottom: 0;
    padding: 10px 14px calc(10px + var(--safe-bottom));
    background: linear-gradient(to top, var(--bg) 70%, transparent);
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  .navbtn {
    flex: 1;
    padding: 16px;
    font-size: 17px;
    font-weight: 700;
    border-radius: 14px;
    border: none;
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    touch-action: manipulation;
  }
  .navbtn:active { background: #2a2a2a; transform: scale(0.98); }
  .navbtn.primary { background: var(--accent); color: #0a0a0a; }

  /* Modal */
  .modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal.open { display: flex; }
  .sheet {
    width: 100%;
    max-width: 480px;
    background: var(--card);
    border-radius: 16px 16px 0 0;
    padding: 16px 16px calc(16px + var(--safe-bottom));
    max-height: 80vh;
    overflow-y: auto;
  }
  .sheet h3 { margin: 0 0 10px; font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }
  .sheet button {
    display: block;
    width: 100%;
    text-align: left;
    padding: 12px 14px;
    background: var(--card2);
    border: none;
    border-radius: 10px;
    color: var(--text);
    font-size: 16px;
    margin-bottom: 8px;
    cursor: pointer;
  }
  .sheet button.active { background: var(--accent); color: #0a0a0a; font-weight: 700; }
  .sheet button.danger { color: var(--red); }

  .empty {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
  }

  /* No-select for letter, but allow it for question/option text on long press */
  .qtext, .option .text, .comment { -webkit-user-select: text; user-select: text; }

  /* Star button + source link + fragment hint */
  .qmeta-row { display: flex; gap: 6px; align-items: center; }
  .star-btn {
    background: transparent; border: none; color: var(--muted);
    font-size: 22px; cursor: pointer; padding: 0 2px; line-height: 1;
  }
  .star-btn.on { color: #fbbf24; }
  .source-link {
    color: var(--accent); text-decoration: none; font-size: 14px;
    padding: 6px 10px; border-radius: 6px;
    background: rgba(96, 165, 250, 0.10);
    flex-shrink: 0; line-height: 1;
    -webkit-tap-highlight-color: rgba(96,165,250,0.25);
    cursor: pointer;
  }
  .source-link:active { opacity: 0.6; }
  .fragment-hint {
    margin: 8px 0 12px;
    padding: 8px 10px;
    background: rgba(245, 158, 11, 0.10);
    border-left: 3px solid var(--orange);
    border-radius: 6px;
    font-size: 12px; color: #d4d4d4; line-height: 1.4;
  }
  .free-answer {
    padding: 16px;
    background: var(--green-bg);
    border: 2px solid var(--green-border);
    border-radius: 12px;
    color: var(--green);
    font-size: 22px; font-weight: 700;
    text-align: center;
  }

  /* Side drawer (replaces overcrowded topbar buttons) */
  .drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 80;
    opacity: 0; pointer-events: none;
    transition: opacity 200ms ease;
  }
  .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: 78%; max-width: 320px;
    background: var(--card);
    z-index: 81;
    transform: translateX(-100%);
    transition: transform 220ms ease;
    overflow-y: auto;
    padding: calc(12px + env(safe-area-inset-top)) 14px calc(12px + env(safe-area-inset-bottom));
    border-right: 1px solid var(--line);
  }
  .drawer.open { transform: translateX(0); }
  .drawer h4 {
    margin: 14px 0 6px; font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.6px;
  }
  .drawer h4:first-child { margin-top: 0; }
  .drawer a, .drawer button {
    display: flex; align-items: center;
    gap: 10px; width: 100%;
    padding: 12px 14px;
    background: var(--card2); color: var(--text);
    border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600; text-decoration: none;
    margin-bottom: 6px; cursor: pointer;
    text-align: left;
  }
  .drawer a.current { background: var(--accent); color: #0a0a0a; }
  .drawer .icon { font-size: 18px; min-width: 22px; text-align: center; }
  .menu-btn {
    background: var(--card); color: var(--text);
    border: none; padding: 8px 12px; border-radius: 8px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    line-height: 1;
  }

  /* Test/practice mode — interactive options */
  .option.selected {
    background: rgba(96,165,250,0.15);
    border-color: var(--accent);
  }
  .option.selected .letter { color: var(--accent); }
  .option.wrong-pick {
    background: rgba(239, 68, 68, 0.15);
    border-color: rgba(239, 68, 68, 0.55);
  }
  .option.wrong-pick .letter { color: var(--red); }
  .option.wrong-pick::after {
    content: "✗"; margin-left: auto;
    color: var(--red); font-weight: 800; font-size: 18px;
    align-self: center;
  }
  .submit-btn {
    margin-top: 10px;
    width: 100%;
    padding: 14px;
    background: var(--accent); color: #0a0a0a;
    border: none; border-radius: 10px;
    font-size: 16px; font-weight: 700; cursor: pointer;
  }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .submit-btn:active { opacity: 0.8; }
  .result-banner {
    margin-top: 10px; padding: 10px 14px;
    border-radius: 10px; font-size: 14px; font-weight: 700;
    text-align: center;
  }
  .result-banner.correct { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .result-banner.wrong   { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.55); }

  /* Inline search bar — slides down below topbar to filter the main pool */
  .searchbar {
    display: none;
    padding: 8px 14px 4px;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    gap: 8px; align-items: center;
    position: sticky; top: 56px; z-index: 9;
  }
  .searchbar.open { display: flex; }
  .searchbar input {
    flex: 1; padding: 8px 12px; border-radius: 8px;
    background: var(--card2); color: var(--text);
    border: 1px solid var(--card2); font-size: 15px;
    -webkit-appearance: none; appearance: none;
  }
  .searchbar input::placeholder { color: var(--muted); }
  .searchbar .clear-btn {
    background: var(--card); color: var(--text);
    border: none; padding: 8px 12px; border-radius: 8px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    line-height: 1;
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="topmeta">
      <div class="left" style="min-width:0; overflow:hidden;">
        <button class="menu-btn" id="menuBtn" aria-label="Menu">☰</button>
        <span id="counter">0 / 0</span>
        <span id="filterLabel" style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></span>
      </div>
      <div style="display:flex; gap:6px; flex-shrink:0;">
        <button class="toolbtn" id="langBtn" title="Toggle language">EN</button>
        <button class="toolbtn" id="filterBtn">Filter</button>
      </div>
    </div>
  </div>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="drawer" id="drawer" aria-label="Menu">
    <h4>Views</h4>
    <a href="feed.html"><span class="icon">📜</span> Quiz (feed)</a>
    <a href="quiz.html" class="current"><span class="icon">🃏</span> Single card</a>
    <a href="exam.html"><span class="icon">📋</span> Mock Exam</a>
    <a href="cheatsheet.html"><span class="icon">📊</span> Cheatsheet</a>
    <a href="rules.html"><span class="icon">📖</span> Rule Book</a>
    <a href="signs.html"><span class="icon">🚸</span> Signs</a>
    <h4>Quick actions</h4>
    <button id="drawerSearchBtn"><span class="icon">⌕</span> Search</button>
    <button id="drawerShuffleBtn"><span class="icon">🔀</span> Shuffle</button>
  </aside>

  <div class="searchbar" id="searchbar">
    <input id="searchInput" type="search" placeholder="Search…" autocomplete="off" />
    <button class="clear-btn" id="searchClear" title="Clear">×</button>
  </div>

  <div class="stage" id="stage">
    <div class="empty" id="loading">Loading questions…</div>
  </div>

  <div class="bottombar" id="bottombar" style="display:none;">
    <button class="navbtn" id="prevBtn">← Prev</button>
    <button class="navbtn primary" id="nextBtn">Next →</button>
  </div>

  <div class="modal" id="modal">
    <div class="sheet" id="sheet"></div>
  </div>

<script>
(() => {
  const STATE_KEY = 'dt_state_v1';
  const ORDER_KEY = 'dt_order_v1';

  let order = [];           // array of indices into questions
  let pos = 0;              // current position in order
  let pointsAllowed = new Set(); // empty = all allowed; otherwise only these point values
  let favOnly = false;      // favorites-only toggle
  let mistakesOnly = false; // wrong-answers-only toggle
  let klasseKey = 'all';    // all | grundstoff | b | lkw
  let lang = 'en';          // en | de
  let searchQuery = '';     // live search filter; empty = no search
  let mode = 'memorize';    // 'memorize' | 'test'
  let commentExpanded = {}; // qid -> bool
  let currentSelected = new Set(); // letters selected for the current unsubmitted test question

  const PROGRESS_KEY = 'dt_progress_v1';
  let progress = {};        // qid -> { result: 'correct'|'wrong', selected: [letters] }
  function loadProgress() {
    try { progress = JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}') || {}; } catch { progress = {}; }
  }
  function saveProgress() {
    try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress)); } catch {}
  }

  const $ = id => document.getElementById(id);
  const T = (en, de) => lang === 'de' ? de : en;

  /* ---------- persistence ---------- */
  function saveState() {
    localStorage.setItem(STATE_KEY, JSON.stringify({ pos, pointsAllowed: [...pointsAllowed], favOnly, mistakesOnly, klasseKey, lang, searchQuery, mode, commentExpanded }));
    localStorage.setItem(ORDER_KEY, JSON.stringify(order));
  }
  function loadState() {
    try {
      const s = JSON.parse(localStorage.getItem(STATE_KEY) || '{}');
      const o = JSON.parse(localStorage.getItem(ORDER_KEY) || 'null');
      if (typeof s.pos === 'number') pos = s.pos;
      if (Array.isArray(s.pointsAllowed)) pointsAllowed = new Set(s.pointsAllowed.map(Number));
      else if (s.p5Only === true) pointsAllowed = new Set([5]); // legacy migration
      if (typeof s.favOnly === 'boolean') favOnly = s.favOnly;
      if (typeof s.mistakesOnly === 'boolean') mistakesOnly = s.mistakesOnly;
      if (typeof s.klasseKey === 'string') klasseKey = s.klasseKey;
      if (typeof s.lang === 'string') lang = s.lang;
      if (typeof s.searchQuery === 'string') searchQuery = s.searchQuery;
      if (s.mode === 'memorize' || s.mode === 'test') mode = s.mode;
      if (s.commentExpanded) commentExpanded = s.commentExpanded;
      if (Array.isArray(o)) order = o;
    } catch (e) {}

    // URL ?lang=de override (handy for hreflang links)
    const urlLang = new URLSearchParams(location.search).get('lang');
    if (urlLang === 'de' || urlLang === 'en') lang = urlLang;
  }

  // Substring match across question id, question text (EN+DE), correct answers, options.
  function matchesQuery(idx, q) {
    if (!q) return true;
    const en = DT.structural(idx);
    const de = DT.getQ(idx, 'de');
    const haystacks = [
      en.question_id, en.question_text || '', de && de.question_text || '',
      ...(en.correct_answers || []).map(c => c.text || c.letter || ''),
      ...(de && de.correct_answers || []).map(c => c.text || c.letter || ''),
      ...(en.options || []).map(o => o.text || ''),
      ...(de && de.options || []).map(o => o.text || '')
    ];
    return haystacks.some(s => s && s.toLowerCase().includes(q));
  }

  /* ---------- order / filter ---------- */
  function rebuildOrder() {
    let pool = DT.poolIndices(klasseKey);
    if (pointsAllowed.size) {
      pool = pool.filter(i => pointsAllowed.has(DT.pointsNum(DT.structural(i))));
    }
    if (favOnly) {
      const favs = new Set(DT.favoriteIds());
      pool = pool.filter(i => favs.has(DT.structural(i).question_id));
    }
    if (mistakesOnly) {
      const ms = new Set(DT.mistakeIds());
      pool = pool.filter(i => ms.has(DT.structural(i).question_id));
    }
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      pool = pool.filter(i => matchesQuery(i, q));
    }
    order = pool;
    pos = 0;
    currentSelected = new Set();
    saveState();
  }

  // Jump to a specific EN-array index — used by the search results.
  function jumpToIndex(idx) {
    // Make sure idx is in current order; if not, drop the filter to show it.
    let p = order.indexOf(idx);
    if (p < 0) {
      // reset filters so we can show it
      p5Only = false; favOnly = false; klasseKey = 'all';
      rebuildOrder();
      p = order.indexOf(idx);
    }
    if (p >= 0) {
      pos = p;
      saveState();
      render();
    }
  }

  function shuffle() {
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }
    pos = 0;
    saveState();
    render();
  }

  /* ---------- render ---------- */
  function render() {
    document.documentElement.lang = lang;
    $('langBtn').textContent = lang.toUpperCase();

    if (!order.length) {
      $('stage').innerHTML = `<div class="empty">${T('No questions match this filter.', 'Keine Fragen für diesen Filter.')}</div>`;
      $('bottombar').style.display = 'none';
      $('counter').textContent = '0 / 0';
      $('progressFill').style.width = '0%';
      return;
    }
    pos = Math.max(0, Math.min(pos, order.length - 1));
    const q = DT.getQ(order[pos], lang);
    const correctSet = new Set((q.correct_answers || []).map(c => c.letter));
    const isP5 = DT.pointsNum(q) === 5;

    $('counter').textContent = `${pos + 1} / ${order.length}`;
    $('progressFill').style.width = `${((pos + 1) / order.length) * 100}%`;
    const labels = [];
    if (mode === 'test') labels.push(T('TEST', 'TEST'));
    if (klasseKey !== 'all') labels.push(DT.klasseLabel(klasseKey, lang));
    if (pointsAllowed.size) {
      const sorted = [...pointsAllowed].sort();
      labels.push(`${sorted.join('+')}pt`);
    }
    if (favOnly) labels.push(T('★ favorites', '★ Favoriten'));
    if (mistakesOnly) labels.push(T('✗ mistakes', '✗ Fehler'));
    if (searchQuery) labels.push(`"${searchQuery}"`);

    // Stats in test mode: right/wrong/unseen counts within current order
    if (mode === 'test') {
      let right = 0, wrong = 0;
      for (const i of order) {
        const qid = DT.structural(i).question_id;
        const p = progress[qid];
        if (p) { if (p.result === 'correct') right++; else wrong++; }
      }
      const unseen = order.length - right - wrong;
      labels.push(`${right}✓ · ${wrong}✗ · ${unseen}…`);
    }
    $('filterLabel').textContent = labels.length ? '· ' + labels.join(' · ') : '';

    let media = '';
    if (q.image_urls && q.image_urls.length) {
      media = `<div class="media"><img loading="lazy" decoding="async" src="${escapeAttr(q.image_urls[0])}" alt="" /></div>`;
    } else if (q.video_urls && q.video_urls.length) {
      media = `<div class="media"><video id="qvideo" controls playsinline preload="metadata" src="${escapeAttr(q.video_urls[0])}"></video></div>`;
    }

    // Detect free-text question (no options, but a correct_answers entry with text in .letter).
    const hasOptions = q.options && q.options.length > 0;
    const submitted = mode === 'test' && !!progress[q.question_id];
    let answerBlock;
    if (!hasOptions && q.correct_answers && q.correct_answers.length) {
      const ans = q.correct_answers.map(c => escapeHtml(c.text || c.letter)).join(' / ');
      answerBlock = `<div class="free-answer">${T('Answer', 'Antwort')}: ${ans}</div>`;
    } else if (mode === 'test') {
      // Test mode: options without pre-highlighting until submit/reveal
      const userSet = submitted
        ? new Set(progress[q.question_id].selected || [])
        : currentSelected;
      const opts = (q.options || []).map(o => {
        const isCorrect = correctSet.has(o.letter);
        const isSel = userSet.has(o.letter);
        let cls = '';
        if (submitted) {
          if (isCorrect) cls = 'correct';            // always reveal correct ones
          else if (isSel) cls = 'wrong-pick';        // user selected but it was wrong
        } else if (isSel) {
          cls = 'selected';
        }
        return `<div class="option ${cls}" data-letter="${escapeAttr(o.letter)}">
          <span class="letter">${escapeHtml(o.letter)}</span>
          <span class="text">${escapeHtml(o.text)}</span>
        </div>`;
      }).join('');

      let footer = '';
      if (submitted) {
        const r = progress[q.question_id].result;
        footer = `<div class="result-banner ${r}">${
          r === 'correct' ? T('✓ Correct', '✓ Richtig') : T('✗ Wrong', '✗ Falsch')
        }</div>`;
      } else {
        footer = `<button class="submit-btn" id="submitBtn"${currentSelected.size === 0 ? ' disabled' : ''}>${T('Submit', 'Bestätigen')}</button>`;
      }
      answerBlock = `<div class="options">${opts}</div>${footer}`;
    } else {
      // Memorize mode: pre-highlight correct answers (default visual priming)
      const opts = (q.options || []).map(o => {
        const correct = correctSet.has(o.letter);
        return `<div class="option ${correct ? 'correct' : ''}">
          <span class="letter">${escapeHtml(o.letter)}</span>
          <span class="text">${escapeHtml(o.text)}</span>
        </div>`;
      }).join('');
      answerBlock = `<div class="options">${opts}</div>`;
    }

    // Fragment-options hint: options begin with sentence pieces that lack a parent header.
    const looksFragmented = hasOptions && q.options.every(o => {
      const t = (o.text || '').trim();
      return t.startsWith('-') ||
             /^(if|to|so as|because|in order|when|by)\b/i.test(t) ||
             /^(wenn|um|da|weil|durch|indem|beim|bevor|sobald)\b/i.test(t);
    });
    const fragmentHint = looksFragmented ? `
      <div class="fragment-hint">
        ${T(
          'These options look like sentence fragments. The original page groups them under a header (e.g. Pass / Do not pass) that the source data dropped. Tap View source for full context.',
          'Diese Optionen sind nur Satzteile. Auf der Originalseite stehen sie unter einer Überschrift (z. B. Vorbeifahren / Nicht vorbeifahren), die in den Quelldaten fehlt. Tippe Quelle für den vollen Kontext.'
        )}
      </div>` : '';

    const expanded = commentExpanded[q.question_id];
    const commentHtml = q.comment ? `
      <div class="comment ${expanded ? '' : 'collapsed'}" id="comment">${escapeHtml(q.comment)}</div>
      <div class="comment-toggle" id="commentToggle">${expanded ? T('Show less', 'Weniger anzeigen') : T('Show explanation', 'Erklärung anzeigen')}</div>
    ` : '';

    const fav = DT.isFavorite(q.question_id);
    const sourceLink = q.url ? `<a class="source-link" id="sourceLink" href="${escapeAttr(q.url)}" target="_blank" rel="noopener">↗</a>` : '';

    $('stage').innerHTML = `
      <div class="qmeta qmeta-row">
        <button class="star-btn ${fav ? 'on' : ''}" id="starBtn" title="${T('Favorite','Favorit')}">${fav ? '★' : '☆'}</button>
        <span style="flex:1; min-width:0; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;">${escapeHtml(q.question_id)} · ${escapeHtml(q.theme_name)}</span>
        ${sourceLink}
        <span class="points ${isP5 ? 'p5' : ''}">${escapeHtml(q.points)}</span>
      </div>
      <div class="qtext">${escapeHtml(q.question_text)}</div>
      ${media}
      ${fragmentHint}
      ${answerBlock}
      ${commentHtml}
    `;
    $('bottombar').style.display = 'flex';
    $('stage').scrollTop = 0;

    // Localized button labels
    $('prevBtn').textContent = T('← Prev', '← Zurück');
    $('nextBtn').textContent = T('Next →', 'Weiter →');
    $('shuffleBtn').textContent = T('Shuffle', 'Mischen');
    $('filterBtn').textContent = T('Filter', 'Filter');

    if (q.comment) {
      $('commentToggle').onclick = () => {
        commentExpanded[q.question_id] = !commentExpanded[q.question_id];
        saveState();
        render();
      };
    }

    // Star toggle
    const starBtn = document.getElementById('starBtn');
    if (starBtn) {
      starBtn.onclick = () => {
        const nowFav = DT.toggleFavorite(q.question_id);
        starBtn.textContent = nowFav ? '★' : '☆';
        starBtn.classList.toggle('on', nowFav);
        // If we're filtering by favorites and just unstarred, rebuild
        if (favOnly && !nowFav) {
          rebuildOrder();
          render();
        }
      };
    }

    // Test mode: option taps + submit
    if (mode === 'test' && hasOptions && !submitted) {
      const isMulti = (q.correct_answers || []).length > 1;
      document.querySelectorAll('.option[data-letter]').forEach(el => {
        el.addEventListener('click', () => {
          const L = el.dataset.letter;
          if (isMulti) {
            if (currentSelected.has(L)) currentSelected.delete(L);
            else currentSelected.add(L);
          } else {
            currentSelected.clear();
            currentSelected.add(L);
          }
          // Light re-render of options + submit button
          renderOptionsOnly(q, correctSet);
        });
      });
      const submitBtn = document.getElementById('submitBtn');
      if (submitBtn) submitBtn.onclick = () => submitAnswer(q, correctSet);
    }

    // Source link — fall back to window.open for iOS PWA standalone where
    // <a target="_blank"> sometimes silently does nothing.
    const srcLink = document.getElementById('sourceLink');
    if (srcLink) {
      srcLink.addEventListener('click', (e) => {
        e.preventDefault();
        const u = srcLink.getAttribute('href');
        const w = window.open(u, '_blank', 'noopener,noreferrer');
        if (!w) location.href = u; // last resort: navigate in-place
      });
    }

    // Wire up last-frame thumbnail + first-play reset for video questions.
    const v = document.getElementById('qvideo');
    if (v) {
      v.addEventListener('loadedmetadata', () => {
        try {
          const d = v.duration;
          v.currentTime = (d && isFinite(d) && d > 0.4) ? Math.max(0.1, d - 0.1) : 0.1;
        } catch(_) {}
      }, { once: true });
      v.addEventListener('play', function onFirstPlay() {
        v.removeEventListener('play', onFirstPlay);
        if (v.duration && Math.abs(v.duration - v.currentTime) < 1) {
          v.currentTime = 0;
        }
      });
    }

    saveState();
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escapeAttr(s) { return escapeHtml(s); }

  function next() {
    if (pos < order.length - 1) {
      pos++;
      currentSelected = new Set();
      render();
    }
  }
  function prev() {
    if (pos > 0) {
      pos--;
      currentSelected = new Set();
      render();
    }
  }

  // Lightweight re-render of just the option pills + submit button when the
  // user taps to select. Avoids redrawing media etc.
  function renderOptionsOnly(q, correctSet) {
    const optsEl = document.querySelector('.stage .options');
    if (!optsEl) return;
    const html = (q.options || []).map(o => {
      const isSel = currentSelected.has(o.letter);
      const cls = isSel ? 'selected' : '';
      return `<div class="option ${cls}" data-letter="${escapeAttr(o.letter)}">
        <span class="letter">${escapeHtml(o.letter)}</span>
        <span class="text">${escapeHtml(o.text)}</span>
      </div>`;
    }).join('');
    optsEl.innerHTML = html;
    const submitBtn = document.getElementById('submitBtn');
    if (submitBtn) submitBtn.disabled = currentSelected.size === 0;
    // Re-attach option click handlers (since we replaced the DOM)
    const isMulti = (q.correct_answers || []).length > 1;
    optsEl.querySelectorAll('.option[data-letter]').forEach(el => {
      el.addEventListener('click', () => {
        const L = el.dataset.letter;
        if (isMulti) {
          if (currentSelected.has(L)) currentSelected.delete(L);
          else currentSelected.add(L);
        } else {
          currentSelected.clear();
          currentSelected.add(L);
        }
        renderOptionsOnly(q, correctSet);
      });
    });
  }

  function submitAnswer(q, correctSet) {
    const selected = [...currentSelected];
    const right = selected.length === correctSet.size && selected.every(l => correctSet.has(l));
    progress[q.question_id] = {
      result: right ? 'correct' : 'wrong',
      selected
    };
    saveProgress();
    DT.recordOutcome(q.question_id, right);
    currentSelected = new Set();
    render(); // full re-render to show result-banner and reveal styling
  }

  /* ---------- modal / filter sheet ---------- */
  function openFilterSheet() {
    const klasseKeys = ['all','grundstoff','b','b_facts','lkw'];
    const favCount = DT.favoriteCount();
    const mistakesCount = DT.mistakeCount();
    const progressCount = Object.keys(progress).length;
    const html = `
      <h3>${T('Mode', 'Modus')}</h3>
      <button class="${mode === 'memorize' ? 'active' : ''}" data-action="mode" data-v="memorize">${T('Memorize (answers pre-highlighted)', 'Auswendiglernen (Antworten vorgehoben)')}</button>
      <button class="${mode === 'test' ? 'active' : ''}" data-action="mode" data-v="test">${T('Test yourself (tap & submit)', 'Selbsttest (tippen & bestätigen)')}</button>
      <h3 style="margin-top:14px;">${T('My mistakes', 'Meine Fehler')}</h3>
      <button class="${!mistakesOnly ? 'active' : ''}" data-action="mistakes" data-v="0">${T('All questions', 'Alle Fragen')}</button>
      <button class="${mistakesOnly ? 'active' : ''}" data-action="mistakes" data-v="1" ${mistakesCount === 0 ? 'disabled style="opacity:0.5;"' : ''}>✗ ${T('Mistakes only', 'Nur Fehler')} (${mistakesCount})</button>
      <button class="danger" data-action="clear-mistakes" ${mistakesCount === 0 ? 'disabled style="opacity:0.5;"' : ''} style="font-size:13px;">${T('Clear mistakes log', 'Fehler-Log löschen')}</button>
      <h3 style="margin-top:14px;">${T('Favorites', 'Favoriten')}</h3>
      <button class="${!favOnly ? 'active' : ''}" data-action="fav" data-v="0">${T('All questions', 'Alle Fragen')}</button>
      <button class="${favOnly ? 'active' : ''}" data-action="fav" data-v="1" ${favCount === 0 ? 'disabled style="opacity:0.5;"' : ''}>★ ${T('Favorites only', 'Nur Favoriten')} (${favCount})</button>
      <h3 style="margin-top:14px;">${T('Klasse', 'Klasse')}</h3>
      ${klasseKeys.map(k => `<button class="${klasseKey === k ? 'active' : ''}" data-action="klasse" data-v="${k}">${escapeHtml(DT.klasseLabel(k, lang))} (${DT.klasseCount(k)})</button>`).join('')}
      <h3 style="margin-top:14px;">${T('Points', 'Punkte')}</h3>
      <div style="display:flex; gap:6px;">
        <button class="${!pointsAllowed.size ? 'active' : ''}" data-action="pts" data-v="all" style="flex:1; margin-bottom:0; text-align:center;">${T('All','Alle')}</button>
        ${[2,3,4,5].map(p => `<button class="${pointsAllowed.has(p) ? 'active' : ''}" data-action="pts" data-v="${p}" style="flex:1; margin-bottom:0; text-align:center;">${p}pt</button>`).join('')}
      </div>
      <h3 style="margin-top:14px;">${T('Language', 'Sprache')}</h3>
      <button class="${lang === 'en' ? 'active' : ''}" data-action="lang" data-v="en">English</button>
      <button class="${lang === 'de' ? 'active' : ''}" data-action="lang" data-v="de">Deutsch</button>
      <h3 style="margin-top:14px;">${T('Progress', 'Fortschritt')}</h3>
      <button class="danger" data-action="reset-test" ${progressCount === 0 ? 'disabled style="opacity:0.5;"' : ''}>${T(`Clear test answers (${progressCount})`, `Test-Antworten löschen (${progressCount})`)}</button>
      <button class="danger" data-action="reset">${T('Reset all progress', 'Alles zurücksetzen')}</button>
      <button data-action="close" style="margin-top:6px; text-align:center;">${T('Close', 'Schließen')}</button>
    `;
    $('sheet').innerHTML = html;
    $('modal').classList.add('open');
    $('sheet').querySelectorAll('button').forEach(b => {
      b.onclick = () => {
        const a = b.dataset.action, v = b.dataset.v;
        if (a === 'close') { $('modal').classList.remove('open'); return; }
        if (a === 'reset') {
          if (confirm(T('Reset everything (filters, position, test answers, favorites, mistakes)?', 'Alles zurücksetzen (Filter, Position, Testantworten, Favoriten, Fehler)?'))) {
            localStorage.removeItem(STATE_KEY);
            localStorage.removeItem(ORDER_KEY);
            localStorage.removeItem(PROGRESS_KEY);
            DT.clearMistakes();
            klasseKey = 'all'; pointsAllowed = new Set(); favOnly = false; mistakesOnly = false; searchQuery = ''; mode = 'memorize';
            progress = {};
            currentSelected = new Set();
            rebuildOrder();
            render();
          }
          $('modal').classList.remove('open');
          return;
        }
        if (a === 'reset-test') {
          if (confirm(T('Clear all test answers? Filters and favorites stay.', 'Testantworten löschen? Filter und Favoriten bleiben.'))) {
            progress = {};
            saveProgress();
            currentSelected = new Set();
            render();
          }
          $('modal').classList.remove('open');
          return;
        }
        if (a === 'clear-mistakes') {
          if (confirm(T('Clear the mistakes log? You can still re-build it by getting questions wrong again.', 'Fehler-Log löschen? Es füllt sich von selbst, wenn du Fragen falsch beantwortest.'))) {
            DT.clearMistakes();
            if (mistakesOnly) { mistakesOnly = false; rebuildOrder(); }
            saveState();
            render();
          }
          $('modal').classList.remove('open');
          return;
        }
        if (a === 'pts') {
          if (v === 'all') pointsAllowed = new Set();
          else {
            const n = +v;
            if (pointsAllowed.has(n)) pointsAllowed.delete(n);
            else pointsAllowed.add(n);
          }
          currentSelected = new Set();
          rebuildOrder();
          saveState();
          render();
          openFilterSheet(); // keep sheet open with updated active states
          return;
        }
        if (a === 'klasse') { klasseKey = v; currentSelected = new Set(); rebuildOrder(); }
        else if (a === 'fav') { favOnly = v === '1'; currentSelected = new Set(); rebuildOrder(); }
        else if (a === 'mistakes') { mistakesOnly = v === '1'; currentSelected = new Set(); rebuildOrder(); }
        else if (a === 'mode'){ mode = v; currentSelected = new Set(); }
        else if (a === 'lang') { lang = v; }
        saveState();
        render();
        $('modal').classList.remove('open');
      };
    });
  }

  // Toggle the inline search bar. Live filters the main pool as you type.
  function toggleSearch() {
    const bar = $('searchbar');
    const input = $('searchInput');
    const open = !bar.classList.contains('open');
    if (open) {
      bar.classList.add('open');
      input.value = searchQuery;
      input.placeholder = T('Search question, answer, ID…', 'Frage, Antwort, ID suchen…');
      setTimeout(() => input.focus(), 50);
    } else {
      // closing without clearing: keep the active search filter applied
      bar.classList.remove('open');
      input.blur();
    }
  }

  function clearSearch() {
    $('searchInput').value = '';
    if (searchQuery) {
      searchQuery = '';
      rebuildOrder();
      render();
    }
    $('searchInput').focus();
  }

  let searchDebounce;
  function onSearchInput(e) {
    clearTimeout(searchDebounce);
    const v = e.target.value.trim();
    searchDebounce = setTimeout(() => {
      if (v === searchQuery) return;
      searchQuery = v;
      rebuildOrder();
      render();
    }, 150);
  }

  /* ---------- gestures ---------- */
  function initGestures() {
    let sx = 0, sy = 0, t0 = 0, tracking = false;
    document.addEventListener('touchstart', e => {
      if (e.touches.length !== 1) return;
      sx = e.touches[0].clientX; sy = e.touches[0].clientY; t0 = Date.now(); tracking = true;
    }, { passive: true });
    document.addEventListener('touchend', e => {
      if (!tracking) return;
      tracking = false;
      const t = e.changedTouches[0];
      const dx = t.clientX - sx, dy = t.clientY - sy, dt = Date.now() - t0;
      if (dt < 600 && Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
        if (dx < 0) next(); else prev();
      }
    }, { passive: true });

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
      else if (e.key === 's' || e.key === 'S') { shuffle(); }
      else if (e.key === 'f' || e.key === 'F') { openFilterSheet(); }
    });
  }

  /* ---------- init ---------- */
  async function init() {
    try {
      await DT.load();
    } catch (e) {
      $('loading').textContent = 'Failed to load questions.';
      return;
    }

    loadState();
    loadProgress();
    if (!order.length || order.length > DT.totalCount()) {
      rebuildOrder();
    } else if (searchQuery) {
      // re-apply search filter on reload (in case dataset/IDs changed)
      rebuildOrder();
    }

    $('nextBtn').onclick = next;
    $('prevBtn').onclick = prev;
    $('filterBtn').onclick = openFilterSheet;
    $('searchInput').addEventListener('input', onSearchInput);
    $('searchClear').onclick = clearSearch;
    $('langBtn').onclick = () => { lang = lang === 'en' ? 'de' : 'en'; saveState(); render(); };
    $('modal').onclick = e => { if (e.target.id === 'modal') $('modal').classList.remove('open'); };

    // Drawer (hamburger menu)
    const openDrawer = () => {
      $('drawer').classList.add('open');
      $('drawerBackdrop').classList.add('open');
    };
    const closeDrawer = () => {
      $('drawer').classList.remove('open');
      $('drawerBackdrop').classList.remove('open');
    };
    $('menuBtn').onclick = openDrawer;
    $('drawerBackdrop').onclick = closeDrawer;
    $('drawerSearchBtn').onclick = () => { closeDrawer(); toggleSearch(); };
    $('drawerShuffleBtn').onclick = () => { closeDrawer(); shuffle(); };

    // If a search query was persisted, show the search bar pre-filled
    if (searchQuery) {
      $('searchbar').classList.add('open');
      $('searchInput').value = searchQuery;
    }

    initGestures();
    render();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
  }

  init();
})();
</script>
</body>
</html>
