<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0a0a0a" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />

<title>Bitte Bestehen — Cheatsheet</title>
<meta name="robots" content="noindex, nofollow" />
<meta name="googlebot" content="noindex, nofollow" />
<meta name="referrer" content="no-referrer" />

<script src="app-shared.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --card: #161616;
    --line: #222;
    --text: #f5f5f5;
    --muted: #888;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f59e0b;
    --accent: #60a5fa;
    --safe-top: env(safe-area-inset-top, 0);
    --safe-bottom: env(safe-area-inset-bottom, 0);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    font-size: 14px; line-height: 1.4; overscroll-behavior: none; }
  body { min-height: 100vh; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }

  /* Header */
  .topbar {
    position: sticky; top: 0; z-index: 20;
    background: rgba(10,10,10,0.92); backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 10px 12px; border-bottom: 1px solid var(--line);
  }
  .row1 { display: flex; gap: 8px; align-items: center; }
  .row1 a { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 13px; flex-shrink: 0; }
  .row1 .title { font-weight: 700; font-size: 14px; flex: 1; text-align: center; }
  .row1 .count { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .row2 {
    display: flex; gap: 6px; margin-top: 8px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .row2::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    padding: 5px 10px; border-radius: 999px;
    background: var(--card); color: var(--text);
    border: 1px solid var(--line);
    font-size: 12px; font-weight: 600; cursor: pointer;
    white-space: nowrap;
  }
  .chip.active { background: var(--accent); color: #0a0a0a; border-color: var(--accent); }
  .row3 { margin-top: 8px; }
  .search {
    width: 100%; padding: 8px 12px; border-radius: 8px;
    background: var(--card); color: var(--text);
    border: 1px solid var(--line); font-size: 14px;
    -webkit-appearance: none; appearance: none;
  }
  .search::placeholder { color: var(--muted); }

  /* Main */
  main { padding: 0 0 60px; }
  .theme-h {
    position: sticky; top: 0; z-index: 5;
    background: #111; padding: 10px 12px 6px;
    border-bottom: 1px solid var(--line);
    font-size: 11px; font-weight: 800; letter-spacing: 0.6px;
    color: var(--accent); text-transform: uppercase;
  }
  .chapter-h {
    padding: 8px 12px 4px;
    font-size: 11px; color: var(--muted); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.4px;
    background: #0d0d0d;
  }
  .q {
    display: flex; gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--line);
    align-items: flex-start;
  }
  .q .pts {
    flex-shrink: 0;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px;
    background: #2a2a2a; color: #ddd;
    font-size: 10px; font-weight: 800;
  }
  .q .pts.p5 { background: rgba(239,68,68,0.18); color: var(--red); }
  .q .pts.p4 { background: rgba(245,158,11,0.18); color: var(--orange); }
  .q .body { flex: 1; min-width: 0; }
  .q .qid { font-size: 10px; color: var(--muted); font-family: ui-monospace, "SF Mono", monospace; }
  .q .qtext { color: var(--text); font-size: 14px; line-height: 1.35; margin: 1px 0 3px; }
  .q .a-inline { font-size: 13.5px; color: var(--green); font-weight: 600; }
  .q .a-list { margin: 2px 0 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 2px; }
  .q .a-list li {
    color: var(--green); font-size: 13px;
    padding-left: 12px; position: relative;
  }
  .q .a-list li::before {
    content: "✓"; position: absolute; left: 0; top: 0;
    font-weight: 700; color: var(--green);
  }
  .q .media {
    flex-shrink: 0;
    width: 64px; height: 64px;
    border-radius: 6px; overflow: hidden;
    background: #000;
    display: flex; align-items: center; justify-content: center;
  }
  .q .media img, .q .media video {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .q .media .vbadge {
    position: absolute; font-size: 11px; color: white;
    background: rgba(0,0,0,0.55); padding: 1px 4px; border-radius: 3px;
    pointer-events: none;
  }
  .q .media-wrap { position: relative; flex-shrink: 0; }
  .q .media .vtile {
    width: 100%; height: 100%;
    background: #1f1f1f; color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700;
  }
  .q .star-btn {
    background: transparent; border: none; color: var(--muted);
    font-size: 16px; cursor: pointer; padding: 0; line-height: 1;
    flex-shrink: 0;
  }
  .q .star-btn.on { color: #fbbf24; }
  .q .source-link {
    color: var(--accent); text-decoration: none; font-size: 12px;
    padding: 3px 7px; border-radius: 5px; margin-left: 6px;
    background: rgba(96,165,250,0.12); display: inline-block;
    -webkit-tap-highlight-color: rgba(96,165,250,0.25);
  }
  .q .a-free { color: var(--green); font-size: 14px; font-weight: 700; }

  .empty { padding: 60px 20px; text-align: center; color: var(--muted); }

  /* Print / PDF */
  @media print {
    :root { --bg: #fff; --card: #fff; --text: #111; --muted: #555; --line: #ddd; --accent: #2563eb; --green: #15803d; --red: #b91c1c; --orange: #b45309; }
    body { background: #fff; color: #111; font-size: 11pt; }
    .topbar, .row2, .row3, .row1 a, .row1 .count { display: none !important; }
    .row1 .title { font-size: 16pt; margin: 0 0 8pt; text-align: left; }
    .topbar { position: static; border: 0; padding: 0 0 8pt; backdrop-filter: none; background: #fff; }
    .theme-h { position: static; background: #fff; color: #2563eb; border-color: #ccc; page-break-before: always; }
    .theme-h:first-of-type { page-break-before: auto; }
    .chapter-h { background: #fff; color: #555; }
    .q { border-color: #eee; page-break-inside: avoid; }
    .q .pts { background: #f3f4f6; color: #111; }
    .q .pts.p5 { background: #fee2e2; color: #b91c1c; }
    .q .pts.p4 { background: #fef3c7; color: #b45309; }
    .q .a-inline, .q .a-list li { color: #15803d; }
    .q .media { width: 48px; height: 48px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .q .media img { width: 100%; height: 100%; object-fit: cover; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .q .media .vtile { background: #f3f4f6; color: #2563eb; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .q .media video { display: none; }
    .vbadge { display: none; }
  }

  /* Compact mode toggles */
  .hide-on-print { /* placeholder */ }

  /* Floating action button: print */
  .fab {
    position: fixed; right: 14px; bottom: calc(14px + var(--safe-bottom));
    background: var(--accent); color: #0a0a0a;
    width: 50px; height: 50px; border-radius: 25px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700; border: none;
    box-shadow: 0 6px 18px rgba(0,0,0,0.4);
    cursor: pointer; z-index: 30;
  }
  .fab:active { transform: scale(0.95); }
</style>
</head>
<body>
  <header class="topbar">
    <div class="row1">
      <button class="chip" id="menuBtn" aria-label="Menu" style="font-size:16px; line-height:1;">☰</button>
      <span class="title">Cheatsheet</span>
      <button class="chip" id="langBtn" style="margin-left:auto;" title="Toggle language">EN</button>
      <span class="count" id="count">…</span>
    </div>
    <div class="row2" id="chips"></div>
    <div class="row3"><input class="search" id="search" placeholder="Search question or answer…" type="search" /></div>
  </header>

  <main id="main"><div class="empty">Loading…</div></main>

  <button class="fab" id="printFab" title="Print / Save as PDF">⎙</button>

<script>
(() => {
  const $ = id => document.getElementById(id);
  // filter state: 'all' | 'p5' | 'klasse:b|grundstoff|lkw' | 'theme:<en theme_name>'
  let active = 'all';
  let lang = 'en';
  let query = '';
  let io = null;
  const T = (en, de) => lang === 'de' ? de : en;

  async function init() {
    try {
      await DT.load();
    } catch (e) {
      $('main').innerHTML = '<div class="empty">Failed to load questions.</div>';
      return;
    }
    // restore settings
    try {
      const s = JSON.parse(localStorage.getItem('dt_state_v1') || '{}');
      if (s.lang === 'en' || s.lang === 'de') lang = s.lang;
    } catch {}
    const urlLang = new URLSearchParams(location.search).get('lang');
    if (urlLang === 'de' || urlLang === 'en') lang = urlLang;

    buildChips();
    $('search').addEventListener('input', e => { query = e.target.value.trim().toLowerCase(); renderDebounced(); });
    $('printFab').onclick = onPrintClick;
    $('langBtn').onclick = toggleLang;
    window.addEventListener('beforeprint', () => { eagerLoadAllImages(); });
    const drawerCtl = DT.installDrawer('cheatsheet');
    $('menuBtn').onclick = drawerCtl.open;
    render();
  }

  function toggleLang() {
    lang = lang === 'en' ? 'de' : 'en';
    try {
      const cur = JSON.parse(localStorage.getItem('dt_state_v1') || '{}');
      cur.lang = lang;
      localStorage.setItem('dt_state_v1', JSON.stringify(cur));
    } catch {}
    document.documentElement.lang = lang;
    $('langBtn').textContent = lang.toUpperCase();
    $('search').placeholder = T('Search question or answer…', 'Frage oder Antwort suchen…');
    buildChips();
    render();
  }

  // Eagerly set src on every lazy image so they're in the document for print/PDF.
  function eagerLoadAllImages() {
    const imgs = document.querySelectorAll('img[data-src]');
    imgs.forEach(img => {
      img.src = img.dataset.src;
      delete img.dataset.src;
    });
    if (io) {
      document.querySelectorAll('img').forEach(img => io.unobserve(img));
    }
  }

  // Wait for every image in the document to finish loading (or fail).
  function waitForAllImages() {
    const imgs = Array.from(document.querySelectorAll('img'));
    return Promise.all(imgs.map(img => {
      if (img.complete && img.naturalWidth > 0) return Promise.resolve();
      return new Promise(res => {
        const done = () => res();
        img.addEventListener('load', done, { once: true });
        img.addEventListener('error', done, { once: true });
        // safety timeout
        setTimeout(done, 8000);
      });
    }));
  }

  // Replace each <video> with a small "▶ video" tile so the PDF has a clean
  // placeholder. We can't draw the video into a canvas because the media bucket
  // doesn't return CORS headers, which would taint the canvas.
  function replaceVideosWithTiles() {
    document.querySelectorAll('video').forEach(v => {
      const tile = document.createElement('div');
      tile.className = 'vtile';
      tile.textContent = '▶';
      v.replaceWith(tile);
    });
  }

  async function onPrintClick() {
    const fab = $('printFab');
    const originalText = fab.textContent;
    fab.disabled = true;
    fab.textContent = '…';
    try {
      eagerLoadAllImages();
      replaceVideosWithTiles();
      await waitForAllImages();
      // give layout one frame to settle
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
    } finally {
      fab.textContent = originalText;
      fab.disabled = false;
    }
    window.print();
  }

  function buildChips() {
    const total = DT.totalCount();
    const favCount = DT.favoriteCount();
    const klasses = ['grundstoff','b','b_facts','lkw'];
    // English theme names from structural data — stable for filter key, but display localized
    const themesEN = Array.from(new Set(DT.all().map(q => q.theme_name)));
    const themeLabel = (enName) => {
      // find DE label by sampling first matching question
      if (lang === 'de') {
        for (let i = 0; i < DT.totalCount(); i++) {
          const s = DT.structural(i);
          if (s.theme_name === enName) {
            const de = DT.getQ(i, 'de');
            return de.theme_name;
          }
        }
      }
      return enName;
    };
    const p5Count = (() => { let n = 0; for (let i = 0; i < total; i++) if (DT.pointsNum(DT.structural(i)) === 5) n++; return n; })();

    const mistakesCount = DT.mistakeCount();
    // Per-point counts
    const ptsCount = { 2: 0, 3: 0, 4: 0, 5: 0 };
    for (let i = 0; i < total; i++) {
      const n = DT.pointsNum(DT.structural(i));
      if (ptsCount[n] !== undefined) ptsCount[n]++;
    }
    const chips = [
      `<button class="chip ${active==='all'?'active':''}" data-t="all">${T('All','Alle')} (${total})</button>`,
      `<button class="chip ${active==='mistakes'?'active':''}" data-t="mistakes" ${mistakesCount === 0 ? 'disabled style="opacity:0.5;"' : ''}>✗ (${mistakesCount})</button>`,
      `<button class="chip ${active==='fav'?'active':''}" data-t="fav" ${favCount === 0 ? 'disabled style="opacity:0.5;"' : ''}>★ (${favCount})</button>`,
      // One chip per point value
      ...[5,4,3,2].map(p => `<button class="chip ${active==='points:'+p?'active':''}" data-t="points:${p}">${p}pt (${ptsCount[p]||0})</button>`),
      ...klasses.map(k => `<button class="chip ${active==='klasse:'+k?'active':''}" data-t="klasse:${k}">${esc(DT.klasseLabel(k, lang))} (${DT.klasseCount(k)})</button>`),
      ...themesEN.map(t => `<button class="chip ${active==='theme:'+t?'active':''}" data-t="theme:${escAttr(t)}">${esc(themeLabel(t))}</button>`)
    ].join('');
    $('chips').innerHTML = chips;
    $('chips').querySelectorAll('.chip').forEach(b => {
      b.onclick = () => {
        active = b.dataset.t;
        buildChips();
        window.scrollTo(0, 0);
        render();
      };
    });
  }

  function indices() {
    let pool;
    if (active === 'all') pool = Array.from({length: DT.totalCount()}, (_, i) => i);
    else if (active === 'fav') {
      pool = DT.favoriteIndices();
    }
    else if (active === 'mistakes') {
      pool = DT.mistakeIndices();
    }
    else if (active.startsWith('points:')) {
      const n = +active.slice(7);
      pool = [];
      for (let i = 0; i < DT.totalCount(); i++) {
        if (DT.pointsNum(DT.structural(i)) === n) pool.push(i);
      }
    } else if (active === 'p5') {
      // legacy key from older state
      pool = [];
      for (let i = 0; i < DT.totalCount(); i++) {
        if (DT.pointsNum(DT.structural(i)) === 5) pool.push(i);
      }
    } else if (active.startsWith('klasse:')) {
      pool = DT.poolIndices(active.slice(7));
    } else if (active.startsWith('theme:')) {
      const t = active.slice(6);
      pool = [];
      for (let i = 0; i < DT.totalCount(); i++) {
        if (DT.structural(i).theme_name === t) pool.push(i);
      }
    } else {
      pool = Array.from({length: DT.totalCount()}, (_, i) => i);
    }
    if (query) {
      pool = pool.filter(i => {
        const q = DT.getQ(i, lang);
        if ((q.question_text || '').toLowerCase().includes(query)) return true;
        if ((q.correct_answers || []).some(a => (a.text || '').toLowerCase().includes(query))) return true;
        if ((q.question_id || '').toLowerCase().includes(query)) return true;
        return false;
      });
    }
    return pool;
  }

  let renderTimer;
  function renderDebounced() { clearTimeout(renderTimer); renderTimer = setTimeout(render, 120); }

  function render() {
    document.documentElement.lang = lang;
    $('langBtn').textContent = lang.toUpperCase();
    $('search').placeholder = T('Search question or answer…', 'Frage oder Antwort suchen…');

    const idxs = indices();
    $('count').textContent = idxs.length + ' Q';
    if (!idxs.length) {
      $('main').innerHTML = `<div class="empty">${T('No matches.', 'Keine Treffer.')}</div>`;
      return;
    }

    // group by (localized) theme then chapter
    const groups = new Map();
    for (const i of idxs) {
      const q = DT.getQ(i, lang);
      const tk = q.theme_name;
      if (!groups.has(tk)) groups.set(tk, new Map());
      const chMap = groups.get(tk);
      const ck = q.chapter_name;
      if (!chMap.has(ck)) chMap.set(ck, []);
      chMap.get(ck).push(q);
    }

    const html = [];
    for (const [theme, chMap] of groups) {
      html.push(`<div class="theme-h">${esc(theme)}</div>`);
      for (const [chapter, qs] of chMap) {
        html.push(`<div class="chapter-h">${esc(chapter)}</div>`);
        for (const q of qs) html.push(qRow(q));
      }
    }
    $('main').innerHTML = html.join('');
    setupLazyMedia();
    setupStarButtons();
  }

  function setupStarButtons() {
    document.querySelectorAll('.star-btn[data-fav-qid]').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const qid = btn.dataset.favQid;
        const nowFav = DT.toggleFavorite(qid);
        btn.textContent = nowFav ? '★' : '☆';
        btn.classList.toggle('on', nowFav);
        // Refresh the chip count
        buildChips();
        if (active === 'fav') render();
      };
    });
  }

  // Delegate source-link clicks: needed for iOS PWA standalone where bare
  // <a target="_blank"> sometimes silently does nothing.
  document.addEventListener('click', (e) => {
    const a = e.target.closest('a.source-link[data-source]');
    if (!a) return;
    e.preventDefault();
    const u = a.getAttribute('href');
    const w = window.open(u, '_blank', 'noopener,noreferrer');
    if (!w) location.href = u;
  });

  function qRow(q) {
    const pts = (q.points || '').match(/\d/);
    const ptsN = pts ? pts[0] : '';
    const ptsCls = ptsN === '5' ? 'p5' : (ptsN === '4' ? 'p4' : '');
    const correct = q.correct_answers || [];
    const hasOptions = q.options && q.options.length > 0;

    let answersHtml;
    if (!hasOptions && correct.length) {
      // free-text answer (e.g. "60" for max speed)
      const ans = correct.map(c => esc(c.text || c.letter)).join(' / ');
      answersHtml = `<div class="a-free">→ ${ans}</div>`;
    } else {
      const totalLen = correct.reduce((n, a) => n + (a.text || '').length, 0);
      const inline = correct.length === 1 && totalLen <= 60;
      if (inline) {
        answersHtml = `<div class="a-inline">→ ${esc(correct[0].text)}</div>`;
      } else if (correct.length && totalLen <= 90 && correct.every(a => (a.text||'').length < 50)) {
        answersHtml = `<div class="a-inline">→ ${correct.map(a => esc(a.text)).join(' · ')}</div>`;
      } else {
        answersHtml = `<ul class="a-list">${correct.map(a => `<li>${esc(a.text)}</li>`).join('')}</ul>`;
      }
    }

    let mediaHtml = '';
    if (q.image_urls && q.image_urls.length) {
      mediaHtml = `<div class="media-wrap"><div class="media"><img src="${escAttr(q.image_urls[0])}" loading="lazy" decoding="async" width="64" height="64" alt=""/></div></div>`;
    } else if (q.video_urls && q.video_urls.length) {
      mediaHtml = `<div class="media-wrap"><div class="media"><video data-src="${escAttr(q.video_urls[0])}" muted playsinline preload="none" width="64" height="64"></video></div><span class="vbadge">▶</span></div>`;
    }

    const fav = DT.isFavorite(q.question_id);
    const sourceLink = q.url ? `<a class="source-link" data-source="1" href="${escAttr(q.url)}" target="_blank" rel="noopener">↗</a>` : '';

    return `<div class="q">
      <div class="pts ${ptsCls}">${ptsN}</div>
      ${mediaHtml}
      <div class="body">
        <div class="qid">${esc(q.question_id)} ${sourceLink}</div>
        <div class="qtext">${esc(q.question_text)}</div>
        ${answersHtml}
      </div>
      <button class="star-btn ${fav ? 'on' : ''}" data-fav-qid="${escAttr(q.question_id)}">${fav ? '★' : '☆'}</button>
    </div>`;
  }

  function setupLazyMedia() {
    if (io) io.disconnect();
    io = new IntersectionObserver(entries => {
      for (const ent of entries) {
        if (!ent.isIntersecting) continue;
        const el = ent.target;
        const src = el.dataset.src;
        if (!src) continue;
        if (el.tagName === 'IMG') el.src = src;
        else if (el.tagName === 'VIDEO') {
          el.src = src;
          el.preload = 'metadata';
          // Seek to last frame: that's the resolved scenario the user remembers.
          // Falls back to first frame for very short videos or unknown duration.
          el.addEventListener('loadedmetadata', () => {
            try {
              const d = el.duration;
              el.currentTime = (d && isFinite(d) && d > 0.4) ? Math.max(0.1, d - 0.1) : 0.1;
            } catch(_) {}
          }, { once: true });
        }
        delete el.dataset.src;
        io.unobserve(el);
      }
    }, { rootMargin: '300px 0px' });
    document.querySelectorAll('[data-src]').forEach(el => io.observe(el));
  }

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escAttr(s) { return esc(s); }

  init();
})();
</script>
</body>
</html>
